<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://use.hugeicons.com/font/icons.css">

    <link rel="stylesheet" href="style.css">

    <title>Calculator | Team Project</title>
</head>

<body>

    <div class="calculator">

        <section id="output">
            <div id="expression">
                10&times;10
            </div>
            <div id="result">
                100
            </div>
        </section>

        <section id="input">
            <button class="btn light" data-action="clear" data-value="C">
                C
            </button>
            <button class="btn light" data-action="negation" data-value="C">
                +/-
            </button>
            <button class="btn light" data-action="mod" data-value="%">
                %
            </button>
            <button class="btn orange" data-action="division" data-value="/">
                /
            </button>
            <button class="btn dark" data-action="number" data-value="7">
                7
            </button>
            <button class="btn dark" data-action="number" data-value="8">
                8
            </button>
            <button class="btn dark" data-action="number" data-value="9">
                9
            </button>
            <button class="btn orange" data-action="multiplication" data-value="*">
                &times;
            </button>
            <button class="btn dark" data-action="number" data-value="4">
                4
            </button>
            <button class="btn dark" data-action="number" data-value="5">
                5
            </button>
            <button class="btn dark" data-action="number" data-value="6">
                6
            </button>
            <button class="btn orange" data-action="subtraction" data-value="-">
                -
            </button>
            <button class="btn dark" data-action="number" data-value="1">
                1
            </button>
            <button class="btn dark" data-action="number" data-value="2">
                2
            </button>
            <button class="btn dark" data-action="number" data-value="3">
                3
            </button>
            <button class="btn orange" data-action="addition" data-value="+">
                +
            </button>
            <button class="btn dark" data-action="decimal" data-value=".">
                .
            </button>
            <button class="btn dark" data-action="number" data-value="0">
                0
            </button>
            <button class="btn dark" data-action="backspace">
                &#9003;
            </button>
            <button class="btn orange" data-action="submit" data-value="=">
                =
            </button>
        </section>
    </div>


    <script src="script.js"></script>
</body>

</html>
